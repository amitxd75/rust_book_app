name: rust_book
description: "A glassmorphism Flutter reader for the Rust Book, with an embedded Rust Playground and original Rust trivia games."
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.9.0
  webview_flutter_android: ^4.13.0
  shared_preferences: ^2.3.2
  font_awesome_flutter: ^11.0.0
  google_generative_ai: ^0.4.0
  url_launcher: ^6.3.0
  flutter_markdown_plus: ^1.0.11
  markdown: ^7.2.2
  flutter_highlight: ^0.7.0
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.3
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/rust-skills/SKILL.md
